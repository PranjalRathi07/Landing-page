<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Devnix Studio — Premium minimal clothing for the bold generation. Redefine your style." />
    <title>Devnix Studio — Redefine Your Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

      .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); }
      .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.06); }

      /* Scroll reveal */
      .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
      .reveal.visible { opacity: 1; transform: translateY(0); }
      .reveal-l { opacity: 0; transform: translateX(-40px); transition: opacity 0.8s ease, transform 0.8s ease; }
      .reveal-l.visible { opacity: 1; transform: translateX(0); }
      .reveal-r { opacity: 0; transform: translateX(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
      .reveal-r.visible { opacity: 1; transform: translateX(0); }
      .d1 { transition-delay: 0.1s; } .d2 { transition-delay: 0.2s; }
      .d3 { transition-delay: 0.3s; } .d4 { transition-delay: 0.4s; } .d5 { transition-delay: 0.5s; }

      /* Marquee */
      .marquee-track { display: flex; width: max-content; animation: marquee 30s linear infinite; }
      @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

      /* Navbar */
      #navbar { transition: background 0.4s ease, box-shadow 0.4s ease; }
      #navbar.scrolled { background: rgba(10,10,10,0.95) !important; backdrop-filter: blur(24px); box-shadow: 0 1px 0 rgba(255,255,255,0.06); }

      /* Buttons */
      .btn-primary { background: #fff; color: #0a0a0a; transition: all 0.3s ease; }
      .btn-primary:hover { background: #e0e0e0; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.12); }
      .btn-outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.25); transition: all 0.3s ease; }
      .btn-outline:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.55); transform: translateY(-2px); }

      /* Product / Collection hover */
      .card-img { transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
      .group:hover .card-img { transform: scale(1.08); }
      .card-overlay { opacity: 0; transition: opacity 0.4s ease; }
      .group:hover .card-overlay { opacity: 1; }

      /* Hero text */
      .hero-text {
        background: linear-gradient(160deg, #ffffff 40%, #888888 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }

      /* Stat number */
      .stat-num {
        font-family: 'Poppins', sans-serif; font-weight: 800;
        background: linear-gradient(135deg, #fff, #888);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }

      /* Testimonial */
      .tslider { display: flex; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }

      /* Input focus */
      .cta-input:focus { outline: none; border-color: rgba(255,255,255,0.5); }

      /* Mobile menu */
      #mobile-menu { transition: transform 0.4s ease, opacity 0.4s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
